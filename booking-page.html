</head>
<body>
    <div id="black-line"> </div>

    <nav> 
        <ul> 
        <li><a href="">Home</a></li>

<main> 
    <section id="checkout-section">
        <div id="checkout-left">
            <h1>Checkout</h1>
            <h2>Contact Information</h2>

            <div id="contact-row">
                <input type="text" placeholder="First name*" />
                <input type="text" placeholder="Last name*"/>
            </div>
                <input type ="email" placeholder="Email address*"/>
                <input type ="tel" placeholder="Phone number*"/> 

            <h2> Ticket 1 Information</h2>
            <div id="ticket-row"> 
                <input type="text" placeholder="First name*"/>
                <select> 
               <option> Ticket Type </option> 
               <option>Entry Ticket</option>
               <option>Plus Ticket </option>
               <option>Experience Ticket</option>
               </select>
               </div>
               <button type="button"> Add another ticket </button>
               </div>
               <div id="checkout-right">
                <img src="./photos/checkout-photo.png" alt="Valborg Celebration Cup"/>

                <h2>Order summary</h2>
                <p>Items and price will be shown here</p>
                <p>Delivery - eTicket</p>
                <p>Total</p>
                <button>GET YOUR TICKETS</button>
        </div>
    </section>
</main>
